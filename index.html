<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - EA-Informatica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-success { background-color: #25d366; border: none; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="text-center mb-4">📱 Orden de Servicio</h3>
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre del Cliente</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Equipo (Modelo)</label>
                        <input type="text" id="equipo" class="form-control" placeholder="Ej: Samsung S21">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Falla Reportada</label>
                        <textarea id="falla" class="form-control" rows="3" placeholder="Ej: No carga / Pantalla rota"></textarea>
                    </div>

                    <button onclick="enviarWhatsApp()" class="btn btn-success w-100">
                        Enviar Orden por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function enviarWhatsApp() {
            const telefono = "54911XXXXXXXX"; // CAMBIA ESTO POR TU NÚMERO
            const nombre = document.getElementById('nombre').value;
            const equipo = document.getElementById('equipo').value;
            const falla = document.getElementById('falla').value;

            const mensaje = `*NUEVA ORDEN*%0A` +
                            `👤 *Cliente:* ${nombre}%0A` +
                            `📱 *Equipo:* ${equipo}%0A` +
                            `🛠️ *Falla:* ${falla}`;

            const url = `https://wa.me/${telefono}?text=${mensaje}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
