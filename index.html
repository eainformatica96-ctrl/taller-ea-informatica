<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-Informatica | Recepción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.css" rel="stylesheet">
    
    <style>
        :root { --main-blue: #00d4ff; --bg-dark: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .header-box { text-align: center; padding: 20px; }
        .logo-img { max-width: 120px; border-radius: 20px; border: 2px solid var(--main-blue); margin-bottom: 10px; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--main-blue); font-size: 1.5rem; }
        
        .btn-cat { background: var(--card-bg); border: 1px solid #333; color: white; padding: 20px; border-radius: 15px; transition: 0.3s; margin-bottom: 10px; }
        .btn-cat:hover { border-color: var(--main-blue); background: #222; }

        .list-group-item { background: var(--card-bg); color: white; border: 1px solid #333; margin-bottom: 5px; border-radius: 10px !important; }
        
        /* Ajuste del Patrón para que sea 3x3 */
        #patternContainer { margin: 20px auto; width: 300px !important; height: 300px !important; background: #222; border-radius: 15px; border: 2px solid var(--main-blue); }
        .patt-holder { width: 100% !important; height: 100% !important; }

        .hidden { display: none; }
        .step-title { border-left: 4px solid var(--main-blue); padding-left: 10px; margin: 20px 0; font-size: 1.1rem; }
        .price-tag { color: var(--main-blue); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="header-box">
        <img src="https://raw.githubusercontent.com/eainformatica96-ctrl/Taller-EA-Informatica/main/Taller.png" alt="Logo" class="logo-img">
        <h2 class="title">EA-INFORMATICA</h2>
    </div>

    <div id="step-1">
        <h5 class="step-title">Seleccione un servicio</h5>
        <div class="row g-2">
            <div class="col-6"><button class="btn btn-cat w-100" onclick="chooseCategory('MODULOS')">📱 Módulos</button></div>
            <div class="col-6"><button class="btn btn-cat w-100" onclick="chooseCategory('BATERIAS')">🔋 Baterías</button></div>
            <div class="col-6"><button class="btn btn-cat w-100" onclick="chooseCategory('PARTES')">🔌 Partes Chicas</button></div>
            <div class="col-6"><button class="btn btn-cat w-100" onclick="chooseCategory('SOFTWARE')">💻 Software</button></div>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <button class="btn btn-sm text-secondary mb-3" onclick="showStep(1)">← Volver</button>
        <h5 id="cat-selected" class="step-title"></h5>
        
        <div id="search-area">
            <input type="text" id="searchInput" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Ej: A02, S20, G8..." onkeyup="filterProducts()">
        </div>

        <div id="productList" class="list-group"></div>
    </div>

    <div id="step-3" class="hidden">
        <button class="btn btn-sm text-secondary mb-3" onclick="showStep(2)">← Volver</button>
        <h5 class="step-title">Finalizar Orden</h5>
        
        <div class="card bg-dark border-secondary p-3">
            <p class="mb-3 text-info" id="resumen-equipo"></p>
            
            <label class="small text-secondary">Nombre del Cliente</label>
            <input type="text" id="clienteNombre" class="form-control bg-dark text-white border-secondary mb-3">

            <label class="small text-secondary">Seguridad</label>
            <select id="tipoClave" class="form-select bg-dark text-white border-secondary mb-3" onchange="toggleClave()">
                <option value="Sin Clave">Sin Clave</option>
                <option value="PIN">PIN o Contraseña</option>
                <option value="Patron">Patrón de Dibujo</option>
            </select>

            <div id="div-pin" class="hidden"><input type="text" id="valPin" class="form-control mb-3" placeholder="Escriba la clave"></div>
            <div id="div-patron" class="hidden text-center">
                <div id="patternContainer"></div>
                <input type="text" id="valPatronDesc" class="form-control mb-3" placeholder="Aclaración (ej: Una L)">
            </div>

            <label class="small text-secondary">Detalles/Fallas</label>
            <textarea id="detalles" class="form-control bg-dark text-white border-secondary mb-3" rows="2"></textarea>

            <label class="small text-secondary">Método de Pago</label>
            <select id="metodoPago" class="form-select bg-dark text-white border-secondary mb-3">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>

            <button onclick="enviarWhatsApp()" class="btn btn-info w-100 fw-bold py-3">ENVIAR POR WHATSAPP</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.js"></script>
<script>
    // BASE DE DATOS (Muestra)
    const db = [
        { cat: 'MODULOS', nombre: 'Samsung A02 (Incell)', precio: 8500 },
        { cat: 'MODULOS', nombre: 'Samsung A32 4G (Oled)', precio: 15200 },
        { cat: 'MODULOS', nombre: 'iPhone 11 (Incell)', precio: 12000 },
        { cat: 'BATERIAS', nombre: 'Motorola G8 Power', precio: 4500 }
    ];

    let currentCat = '', selectedProd = '', selectedPrice = '', lock;

    function calcularPrecioFinal(base, nombre) {
        const costoEnvio = 15000;
        const manoObraOtros = 20000;
        const manoObraIphone = 50000;
        const esIphone = nombre.toLowerCase().includes('iphone');
        
        let total = (base + costoEnvio) * 2;
        total += (esIphone) ? manoObraIphone : manoObraOtros;
        return total.toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
    }

    function showStep(s) {
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('step-'+s).classList.remove('hidden');
    }

    function chooseCategory(cat) {
        currentCat = cat;
        document.getElementById('cat-selected').innerText = cat;
        document.getElementById('search-area').classList.toggle('hidden', cat === 'SOFTWARE');
        showStep(2);
        filterProducts();
    }

    function filterProducts() {
        const busqueda = document.getElementById('searchInput').value.toLowerCase();
        const lista = document.getElementById('productList');
        lista.innerHTML = '';

        if (currentCat === 'PARTES') {
            addBtnManual("Pin de Carga Universal", "$30.000");
        }

        if (currentCat === 'SOFTWARE') {
            addBtnManual("Cambio de Sistema Operativo", "$30.000");
            addBtnManual("Eliminar cuenta Google", "$40.000");
            addBtnManual("Eliminar Patron/Pin", "$20.000");
            addBtnManual("Eliminar virus de publicidad", "$10.000");
            return;
        }

        const filtrados = db.filter(p => p.cat === currentCat && p.nombre.toLowerCase().includes(busqueda));
        filtrados.forEach(p => {
            const precioVenta = calcularPrecioFinal(p.precio, p.nombre);
            addBtnManual(p.nombre, precioVenta);
        });
    }

    function addBtnManual(nombre, precio) {
        const item = document.createElement('button');
        item.className = 'list-group-item list-group-item-action p-3';
        item.innerHTML = `<div class="d-flex justify-content-between align-items-center">
            <span>${nombre}</span> <span class="price-tag">${precio}</span>
        </div>`;
        item.onclick = () => {
            selectedProd = nombre;
            selectedPrice = precio;
            document.getElementById('resumen-equipo').innerHTML = `<b>Equipo:</b> ${nombre}<br><b>Presupuesto:</b> ${precio}`;
            showStep(3);
            if(!lock) lock = new PatternLock("#patternContainer");
        };
        document.getElementById('productList').appendChild(item);
    }

    function toggleClave() {
        const t = document.getElementById('tipoClave').value;
        document.getElementById('div-pin').classList.toggle('hidden', t !== 'PIN');
        document.getElementById('div-patron').classList.toggle('hidden', t !== 'Patron');
    }

    function enviarWhatsApp() {
        const tel = "5493854416248";
        const cliente = document.getElementById('clienteNombre').value;
        const tipoC = document.getElementById('tipoClave').value;
        const det = document.getElementById('detalles').value;
        const pago = document.getElementById('metodoPago').value;
        let claveInfo = (tipoC === 'PIN') ? document.getElementById('valPin').value : 
                        (tipoC === 'Patron') ? "Dibujado (Obs: "+document.getElementById('valPatronDesc').value+")" : "No tiene";

        const msj = `*EA-INFORMATICA - ORDEN*%0A%0A` +
                    `👤 *Cliente:* ${cliente}%0A` +
                    `📱 *Equipo:* ${selectedProd}%0A` +
                    `💰 *Presupuesto:* ${selectedPrice}%0A` +
                    `🔑 *Seguridad:* ${claveInfo}%0A` +
                    `📝 *Falla:* ${det}%0A` +
                    `💳 *Pago:* ${pago}`;

        window.open(`https://wa.me/${tel}?text=${msj}`, '_blank');
    }
</script>
</body>
</html>
