<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Búsqueda - Taller</title>
    <script src="productos.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f0f2f5; }
        .caja-busqueda { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; font-size: 18px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .precio-txt { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <div class="caja-busqueda">
        <h2>Buscador de Repuestos</h2>
        <input type="text" id="inputBusqueda" placeholder="Escribe para buscar (ej: ALC 1S)...">
        
        <table id="tablaProductos">
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>PRODUCTO</th>
                    <th>PRECIO</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

<script>
    const tabla = document.getElementById('cuerpoTabla');
    const input = document.getElementById('inputBusqueda');

    function buscar() {
        const termino = input.value.toLowerCase();
        tabla.innerHTML = "";

        // Filtramos sobre el array 'db' de productos.js
        const filtrados = db.filter(item => {
            // Adaptación exacta a tus etiquetas: "COD", "PLACAS DE CARGAS" (o similares) y " PRECIO"
            // Usamos Object.values para buscar en cualquier columna sin importar el nombre
            const contenidoFila = Object.values(item).join(" ").toLowerCase();
            return contenidoFila.includes(termino);
        });

        filtrados.forEach(item => {
            const valores = Object.values(item);
            // valores[0] es el COD
            // valores[1] es la DESCRIPCIÓN
            // valores[2] es el PRECIO
            
            const fila = `<tr>
                <td>${valores[0]}</td>
                <td>${valores[1]}</td>
                <td class="precio-txt">${valores[2]}</td>
            </tr>`;
            tabla.innerHTML += fila;
        });

        if (filtrados.length === 0) {
            tabla.innerHTML = '<tr><td colspan="3" style="text-align:center;">No hay coincidencias</td></tr>';
        }
    }

    // Escuchar cuando el usuario escribe
    input.addEventListener('keyup', buscar);

    // Cargar la tabla apenas abre la página
    window.onload = buscar;
</script>

</body>
</html>
