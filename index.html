<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-Informatica | Recepción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.css" rel="stylesheet">
    
    <style>
        :root { --main-blue: #00d4ff; --bg-dark: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; }
        .header-box { text-align: center; padding: 15px; }
        .logo-img { max-width: 90px; border-radius: 15px; border: 2px solid var(--main-blue); margin-bottom: 5px; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--main-blue); font-size: 1.2rem; }
        
        .btn-cat { background: var(--card-bg); border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; transition: 0.3s; margin-bottom: 10px; font-weight: bold; width: 100%; text-align: left; }
        .btn-cat:hover { border-color: var(--main-blue); background: #222; }

        .list-group-item { background: var(--card-bg); color: white; border: 1px solid #333; margin-bottom: 5px; border-radius: 10px !important; cursor: pointer; }
        
        #patternContainer { margin: 10px auto; width: 280px !important; height: 280px !important; background: #222; border-radius: 15px; border: 2px solid var(--main-blue); touch-action: none; }
        .hidden { display: none; }
        .step-title { border-left: 4px solid var(--main-blue); padding-left: 10px; margin: 15px 0; font-size: 1rem; }
        .price-tag { color: var(--main-blue); font-weight: bold; font-size: 1rem; }
        
        .info-calidad { 
            background: rgba(0, 212, 255, 0.1); 
            border: 1px solid var(--main-blue); 
            border-radius: 10px; 
            padding: 12px; 
            font-size: 0.85rem; 
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .info-calidad-modulos {
            background: rgba(138, 43, 226, 0.15);
            border-color: #9c27b0;
        }
        .badge-final { 
            background: #4caf50; 
            color: white; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            display: inline-block; 
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .badge-calidad {
            display: block;
            margin: 3px 0;
            padding: 2px 0;
        }
        .badge-incell { color: #ff9800; font-weight: bold; }
        .badge-oled { color: #2196f3; font-weight: bold; }
        
        label { font-size: 0.85rem; color: var(--main-blue); margin-bottom: 4px; font-weight: bold; display: block; margin-top: 10px; }
        .form-control, .form-select { background-color: #111 !important; color: white !important; border: 1px solid #444 !important; }
        
        .section-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--main-blue), transparent);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container py-2" style="max-width: 450px;">
    <div class="header-box">
        <img src="https://raw.githubusercontent.com/eainformatica96-ctrl/Taller-EA-Informatica/main/Taller.png" alt="Logo" class="logo-img">
        <h2 class="title">EA-INFORMATICA</h2>
    </div>

    <div id="step-1">
        <h5 class="step-title">Seleccione una Categoría</h5>
        <div class="row g-2">
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('Módulos')">📱 Módulos</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('Baterías')">🔋 Baterías</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('PartesChicas')">🔌 Partes Chicas</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('SOFTWARE')">💻 Software</button></div>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <button class="btn btn-sm text-secondary mb-2" onclick="showStep(1)">← Volver</button>
        <h5 id="cat-selected" class="step-title"></h5>
        
        <!-- INFO BOX DINÁMICO (se actualiza según categoría) -->
        <div id="categoriaInfo"></div>
        
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="Buscar modelo..." oninput="filterProducts()">
        <div id="productList" class="list-group"></div>
    </div>

    <div id="step-3" class="hidden">
        <button class="btn btn-sm text-secondary mb-2" onclick="showStep(2)">← Volver</button>
        <h5 class="step-title">Datos de la Orden</h5>
        <div class="card bg-dark border-secondary p-3">
            <p id="resumen-equipo" class="text-info small mb-3"></p>
            <label>Nombre del Cliente:</label>
            <input type="text" id="clienteNombre" class="form-control mb-2">
            
            <label>Tipo de Seguridad:</label>
            <select id="tipoClave" class="form-select mb-2" onchange="toggleClave()">
                <option value="Sin Clave">Sin Clave</option>
                <option value="PIN">PIN / Contraseña</option>
                <option value="Patron">Patrón de Dibujo</option>
            </select>
            <div id="div-pin" class="hidden"><label>Escriba la Clave:</label><input type="text" id="valPin" class="form-control mb-2"></div>
            <div id="div-patron" class="hidden text-center"><label>Dibuje el Patrón:</label><div id="patternContainer"></div></div>
            
            <label>Fallas o Detalles:</label>
            <textarea id="detalles" class="form-control mb-3" rows="2"></textarea>
            
            <div class="section-divider"></div>
            
            <label class="mt-2">Método de Pago:</label>
            <select id="metodoPago" class="form-select mb-3">
                <option value="Efectivo">💵 Efectivo</option>
                <option value="Transferencia">📱 Transferencia</option>
            </select>
            
            <button onclick="enviarWhatsApp()" class="btn btn-info w-100 fw-bold py-3">ENVIAR A WHATSAPP</button>
        </div>
    </div>
</div>

<!-- Base de datos desde GitHub -->
<script src="https://eainformatica96-ctrl.github.io/Taller-EA-Informatica/productos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.js"></script>

<script>
    let currentCat = '', selectedProd = '', selectedPrice = '', lock;

    // 🔑 FÓRMULAS CORRECTAS SEGÚN TUS REQUERIMIENTOS
    function calcularPrecioFinal(base, nombre, categoriaReal) {
        const b = parseInt(base) || 0;
        const nombreUpper = nombre.toUpperCase();
        
        // MÓDULOS: (base + 10000) * 2 + [20000 ó 50000 si es iPhone]
        if (categoriaReal === 'Módulos') {
            const extra = nombreUpper.includes('IPH') ? 50000 : 20000;
            return Math.round((b + 10000) * 2 + extra);
        }
        
        // BATERÍAS Y PARTES CHICAS (Placas, Lentes, Tapas, Flex): (base + 10000) * 2
        if (categoriaReal === 'Baterías' || 
            ['Placas', 'Lentes', 'Tapas', 'Flex'].includes(categoriaReal)) {
            return Math.round((b + 10000) * 2);
        }
        
        // Fallback (no debería ocurrir)
        return b;
    }

    // Formatear número a moneda ARS
    function formatearPrecio(num) {
        return new Intl.NumberFormat('es-AR', {
            style: 'currency',
            currency: 'ARS',
            minimumFractionDigits: 0
        }).format(num);
    }

    function showStep(s) {
        document.querySelectorAll('[id^="step-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('step-'+s).classList.remove('hidden');
    }

    function chooseCategory(cat) {
        currentCat = cat;
        const nombresAmigables = {
            'Módulos': 'MÓDULOS',
            'Baterías': 'BATERÍAS',
            'PartesChicas': 'PARTES CHICAS (Placas, Flex, Lentes, Tapas)',
            'SOFTWARE': 'SOFTWARE'
        };
        document.getElementById('cat-selected').innerText = "Sección: " + nombresAmigables[cat];
        document.getElementById('searchInput').value = '';
        
        // Configurar mensaje informativo según categoría
        const infoBox = document.getElementById('categoriaInfo');
        if (cat === 'Módulos') {
            infoBox.innerHTML = `
                <div class="info-calidad info-calidad-modulos">
                    <b>💡 TIPOS DE CALIDAD EN MÓDULOS:</b><br>
                    <span class="badge-calidad">• <span class="badge-incell">Incell:</span> Calidad Regular (Sin Garantía)</span><br>
                    <span class="badge-calidad">• <span class="badge-oled">Oled:</span> Calidad Original (3 Meses de Garantía)</span><br>
                    <span class="badge-final">✅ PRECIO FINAL (Incluye Mano de Obra + Repúesto)</span>
                </div>
            `;
        } else {
            infoBox.innerHTML = `
                <div class="info-calidad">
                    <span class="badge-final">✅ PRECIO FINAL (Incluye Mano de Obra + Repúesto)</span>
                </div>
            `;
        }
        
        showStep(2);
        filterProducts();
    }

    function filterProducts() {
        const bus = document.getElementById('searchInput').value.toLowerCase().trim();
        const lista = document.getElementById('productList');
        lista.innerHTML = '';

        // Caso especial: SOFTWARE (no viene de la base de datos)
        if (currentCat === 'SOFTWARE') {
            const soft = [
                ["Sistema Operativo / Flasheo", 20000],
                ["Cuenta Google (FRP)", 35000],
                ["Eliminar PIN/Patrón", 20000],
                ["Virus Publicitario", 5000]
            ];
            soft.forEach(s => {
                const precioFmt = formatearPrecio(s[1]);
                addBtn(s[0], precioFmt, s[1], true);
            });
            return;
        }

        // Validar que db esté cargada
        if (typeof db === 'undefined' || !Array.isArray(db)) {
            lista.innerHTML = `<div class="text-danger p-3">❌ Error: Base de datos no cargada. Verifica la consola.</div>`;
            console.error("Base de datos 'db' no encontrada o no es un array");
            return;
        }

        // Mapear categoría del botón a categorías reales de la BD
        let categoriasFiltro = [];
        if (currentCat === 'Módulos') categoriasFiltro = ['Módulos'];
        else if (currentCat === 'Baterías') categoriasFiltro = ['Baterías'];
        else if (currentCat === 'PartesChicas') {
            categoriasFiltro = ['Placas', 'Flex', 'Lentes', 'Tapas'];
            // Mostrar pin universal solo en Partes Chicas
            if (bus === '' || bus.includes('pin universal') || bus.includes('carga universal')) {
                addBtn("Pin de Carga Universal", "$30.000", 30000, false);
            }
        }

        // Filtrar productos
        const filtrados = db.filter(item => {
            const coincideCategoria = categoriasFiltro.includes(item.Categoría);
            const coincideBusqueda = item.Nombre.toLowerCase().includes(bus);
            return coincideCategoria && coincideBusqueda;
        });

        // Mensaje si no hay resultados
        if (filtrados.length === 0 && bus !== '') {
            lista.innerHTML = `<div class="text-center p-3 text-muted">🔍 No se encontraron resultados para "${bus}"</div>`;
            return;
        }

        // Mostrar resultados (máximo 50)
        filtrados.slice(0, 50).forEach(item => {
            const precioBase = parseInt(item.Precio) || 0;
            const precioCalculado = calcularPrecioFinal(precioBase, item.Nombre, item.Categoría);
            const precioFmt = formatearPrecio(precioCalculado);
            addBtn(item.Nombre, precioFmt, precioCalculado, false);
        });
    }

    function addBtn(nombre, precioFmt, precioNum, esSoft) {
        const item = document.createElement('button');
        item.className = esSoft ? 'btn-cat d-flex justify-content-between align-items-center px-3' : 'list-group-item list-group-item-action p-3';
        item.innerHTML = `<span>${nombre}</span><span class="price-tag">${precioFmt}</span>`;
        item.onclick = () => {
            selectedProd = nombre; 
            selectedPrice = precioFmt;
            document.getElementById('resumen-equipo').innerHTML = `<b>📦 ${nombre}</b><br><b>💰 Total: ${precioFmt}</b>`;
            showStep(3);
            if (!lock) {
                lock = new PatternLock("#patternContainer", { margin: 25, radius: 12 });
            } else {
                lock.reset();
            }
        };
        document.getElementById('productList').appendChild(item);
    }

    function toggleClave() {
        const t = document.getElementById('tipoClave').value;
        document.getElementById('div-pin').classList.toggle('hidden', t !== 'PIN');
        document.getElementById('div-patron').classList.toggle('hidden', t !== 'Patron');
    }

    function enviarWhatsApp() {
        const cliente = document.getElementById('clienteNombre').value.trim();
        const detalles = document.getElementById('detalles').value.trim();
        const tipoClave = document.getElementById('tipoClave').value;
        const metodoPago = document.getElementById('metodoPago').value;
        let claveInfo = "";

        if (tipoClave === 'PIN') claveInfo = "🔑 *Clave:* " + (document.getElementById('valPin').value.trim() || "[No especificada]");
        if (tipoClave === 'Patron') claveInfo = "🌀 *Patrón:* (Dibujado en dispositivo)";
        if (tipoClave === 'Sin Clave') claveInfo = "🔓 Sin clave de seguridad";

        if (!cliente) {
            alert("⚠️ Por favor ingresa el nombre del cliente");
            document.getElementById('clienteNombre').focus();
            return;
        }
        
        // Formato mejorado del mensaje con método de pago al final
        const msj = `*EA-INFORMATICA*%0A%0A` +
                    `👤 *Cliente:* ${cliente}%0A` +
                    `📱 *Equipo:* ${selectedProd}%0A` +
                    `💰 *Presupuesto:* ${selectedPrice}%0A` +
                    `${claveInfo ? claveInfo + '%0A' : ''}` +
                    `📝 *Detalles:* ${detalles || "[Sin detalles]"}%0A` +
                    `💳 *Forma de Pago:* ${metodoPago}`;
        
        window.open(`https://wa.me/5493854416248?text=${encodeURIComponent(msj)}`, '_blank');
    }

    // Verificación al cargar
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof db !== 'undefined' && Array.isArray(db)) {
            console.log(`✅ Base de datos verificada: ${db.length} productos cargados`);
        } else {
            console.error("❌ ERROR: La base de datos 'db' NO está definida correctamente");
            alert("Error crítico: Base de datos no cargada. Abre la consola del navegador (F12) para ver detalles.");
        }
    });
</script>
</body>
</html>
