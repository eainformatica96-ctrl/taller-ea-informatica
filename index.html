<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Repuestos</title>
    <script src="productos.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        
        /* Buscador y Filtros */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        #buscador { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-width: 250px; }
        #filtroCat { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }

        /* Tabla de Productos */
        .tabla-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background: #f1f5f9; }
        .precio { font-weight: bold; color: #059669; }
        .categoria { font-size: 0.75rem; background: #e2e8f0; padding: 4px 8px; border-radius: 4px; }

        @media (max-width: 600px) {
            th:nth-child(1), td:nth-child(1) { display: none; } /* Oculta código en móviles */
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Catálogo de Repuestos</h1>
    </header>

    <div class="controls">
        <input type="text" id="buscador" placeholder="Buscar por modelo o repuesto (ej: Moto G8)...">
        <select id="filtroCat">
            <option value="TODOS">Todas las categorías</option>
            <option value="PLACAS">Placas de Carga</option>
            <option value="LENTES">Lentes de Cámara</option>
            <option value="MODULOS">Módulos</option>
            <option value="BATERIAS">Baterías</option>
            <option value="TAPAS">Tapas</option>
            <option value="FLEX">Flex</option>
        </select>
    </div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>Cod</th>
                    <th>Categoría</th>
                    <th>Producto</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody id="listaProductos">
                </tbody>
        </table>
    </div>
</div>

<script>
    const tabla = document.getElementById('listaProductos');
    const buscador = document.getElementById('buscador');
    const filtroCat = document.getElementById('filtroCat');

    // Función para renderizar la tabla
    function mostrarProductos(filtroNombre = "", filtroCategoria = "TODOS") {
        tabla.innerHTML = "";
        
        // Filtramos el array 'db' que viene de productos.js
        const filtrados = db.filter(p => {
            const coincideNombre = p.nombre.toLowerCase().includes(filtroNombre.toLowerCase());
            const coincideCat = filtroCategoria === "TODOS" || p.cat === filtroCategoria;
            return coincideNombre && coincideCat;
        });

        filtrados.forEach(p => {
            const fila = `
                <tr>
                    <td>${p.cod}</td>
                    <td><span class="categoria">${p.cat}</span></td>
                    <td>${p.nombre}</td>
                    <td class="precio">$${p.precio.toLocaleString('es-AR')}</td>
                </tr>
            `;
            tabla.innerHTML += fila;
        });

        if(filtrados.length === 0) {
            tabla.innerHTML = `<tr><td colspan="4" style="text-align:center">No se encontraron productos.</td></tr>`;
        }
    }

    // Eventos para búsqueda en tiempo real
    buscador.addEventListener('input', () => mostrarProductos(buscador.value, filtroCat.value));
    filtroCat.addEventListener('change', () => mostrarProductos(buscador.value, filtroCat.value));

    // Carga inicial
    document.addEventListener('DOMContentLoaded', () => mostrarProductos());
</script>

</body>
</html>
