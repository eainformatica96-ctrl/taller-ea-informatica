<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-Informatica | Recepción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.css" rel="stylesheet">
    
    <style>
        :root { --main-blue: #00d4ff; --bg-dark: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; }
        .header-box { text-align: center; padding: 15px; }
        .logo-img { max-width: 90px; border-radius: 15px; border: 2px solid var(--main-blue); margin-bottom: 5px; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--main-blue); font-size: 1.2rem; }
        
        .btn-cat { background: var(--card-bg); border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; transition: 0.3s; margin-bottom: 10px; font-weight: bold; width: 100%; text-align: left; }
        .btn-cat:hover { border-color: var(--main-blue); background: #222; }

        .list-group-item { background: var(--card-bg); color: white; border: 1px solid #333; margin-bottom: 5px; border-radius: 10px !important; cursor: pointer; }
        
        #patternContainer { margin: 10px auto; width: 280px !important; height: 280px !important; background: #222; border-radius: 15px; border: 2px solid var(--main-blue); touch-action: none; }
        .hidden { display: none; }
        .step-title { border-left: 4px solid var(--main-blue); padding-left: 10px; margin: 15px 0; font-size: 1rem; }
        .price-tag { color: var(--main-blue); font-weight: bold; font-size: 1rem; }
        
        label { font-size: 0.85rem; color: var(--main-blue); margin-bottom: 4px; font-weight: bold; display: block; margin-top: 10px; }
        .form-control, .form-select { background-color: #111 !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>

<div class="container py-2" style="max-width: 450px;">
    <div class="header-box">
        <img src="https://raw.githubusercontent.com/eainformatica96-ctrl/Taller-EA-Informatica/main/Taller.png" alt="Logo" class="logo-img">
        <h2 class="title">EA-INFORMATICA</h2>
    </div>

    <div id="step-1">
        <h5 class="step-title">Seleccione una Categoría</h5>
        <div class="row g-2">
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('MODULOS')">📱 Módulos</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('BATERIAS')">🔋 Baterías</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('PIN DE CARGA')">🔌 Partes Chicas</button></div>
            <div class="col-6"><button class="btn btn-cat" onclick="chooseCategory('SOFTWARE')">💻 Software</button></div>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <button class="btn btn-sm text-secondary mb-2" onclick="showStep(1)">← Volver</button>
        <h5 id="cat-selected" class="step-title"></h5>
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="Buscar modelo..." oninput="filterProducts()">
        <div id="productList" class="list-group"></div>
    </div>

    <div id="step-3" class="hidden">
        <button class="btn btn-sm text-secondary mb-2" onclick="showStep(2)">← Volver</button>
        <h5 class="step-title">Datos de la Orden</h5>
        <div class="card bg-dark border-secondary p-3">
            <p id="resumen-equipo" class="text-info small mb-3"></p>
            <label>Nombre del Cliente:</label>
            <input type="text" id="clienteNombre" class="form-control mb-2">
            <label>Tipo de Seguridad:</label>
            <select id="tipoClave" class="form-select mb-2" onchange="toggleClave()">
                <option value="Sin Clave">Sin Clave</option>
                <option value="PIN">PIN / Contraseña</option>
                <option value="Patron">Patrón de Dibujo</option>
            </select>
            <div id="div-pin" class="hidden"><label>Escriba la Clave:</label><input type="text" id="valPin" class="form-control mb-2"></div>
            <div id="div-patron" class="hidden text-center"><label>Dibuje el Patrón:</label><div id="patternContainer"></div></div>
            <label>Fallas o Detalles:</label>
            <textarea id="detalles" class="form-control mb-2" rows="2"></textarea>
            <button onclick="enviarWhatsApp()" class="btn btn-info w-100 fw-bold py-3">ENVIAR A WHATSAPP</button>
        </div>
    </div>
</div>

<script src="productos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/patternlock@2.0.2/dist/patternlock.min.js"></script>

<script>
    let currentCat = '', selectedProd = '', selectedPrice = '', lock;

    function calcularPrecioFinal(base, nombre, cat) {
        let n = nombre.toLowerCase();
        let c = cat.toUpperCase();
        let b = parseFloat(base.toString().replace(/[$. ]/g, "")) || 0;

        if (c.includes('MODULO')) {
            const mo = n.includes('iph') ? 50000 : 10000; 
            return Math.round((b + 15000) * 2 + mo).toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
        }
        if (c.includes('BATERIA')) {
            return Math.round((b + 5000) * 2 + 5000).toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
        }
        if (c.includes('PIN')) {
            return Math.round((b + 3000) * 2 + 8000).toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
        }
        return b.toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
    }

    function showStep(s) {
        document.querySelectorAll('[id^="step-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('step-'+s).classList.remove('hidden');
    }

    function chooseCategory(cat) {
        currentCat = cat;
        document.getElementById('cat-selected').innerText = "Sección: " + cat;
        document.getElementById('searchInput').value = '';
        showStep(2);
        filterProducts();
    }

    function filterProducts() {
        const bus = document.getElementById('searchInput').value.toLowerCase();
        const lista = document.getElementById('productList');
        lista.innerHTML = '';

        if (currentCat === 'SOFTWARE') {
            const soft = [["Sistema Operativo", "$20.000"],["Cuenta Google", "$35.000"]];
            soft.forEach(s => addBtn(s[0], s[1], true));
            return;
        }

        // Botón Manual Pin Universal
        if (currentCat === 'PIN DE CARGA' && (bus === '' || "pin universal".includes(bus))) {
            addBtn("Pin de Carga Universal", "$30.000", false);
        }

        // Verificamos si la base de datos cargó
        if (typeof db === 'undefined') {
            lista.innerHTML = "<div class='text-danger'>Error: productos.js no cargó o no tiene 'const db ='</div>";
            return;
        }

        const filtrados = db.filter(item => {
            const itemCat = (item.CATEGORIA || "").toUpperCase();
            const itemProd = (item.PRODUCTO || "").toLowerCase();
            return itemCat === currentCat && itemProd.includes(bus);
        });

        filtrados.forEach(item => {
            const final = calcularPrecioFinal(item.PRECIO, item.PRODUCTO, item.CATEGORIA);
            addBtn(item.PRODUCTO, final, false);
        });
    }

    function addBtn(nombre, precio, esSoft) {
        const item = document.createElement('button');
        item.className = esSoft ? 'btn-cat d-flex justify-content-between align-items-center px-3' : 'list-group-item list-group-item-action p-3';
        item.innerHTML = `<span>${nombre}</span><span class="price-tag">${precio}</span>`;
        item.onclick = () => {
            selectedProd = nombre; selectedPrice = precio;
            document.getElementById('resumen-equipo').innerHTML = `<b>📦 ${nombre}</b><br><b>💰 Total: ${precio}</b>`;
            showStep(3);
            if(!lock) lock = new PatternLock("#patternContainer", { margin: 25, radius: 12 }); else lock.reset();
        };
        document.getElementById('productList').appendChild(item);
    }

    function toggleClave() {
        const t = document.getElementById('tipoClave').value;
        document.getElementById('div-pin').classList.toggle('hidden', t !== 'PIN');
        document.getElementById('div-patron').classList.toggle('hidden', t !== 'Patron');
    }

    function enviarWhatsApp() {
        const cliente = document.getElementById('clienteNombre').value;
        if(!cliente) { alert("Nombre obligatorio"); return; }
        const msj = `*EA-INFORMATICA*%0A👤 *Cliente:* ${cliente}%0A📱 *Equipo:* ${selectedProd}%0A💰 *Precio:* ${selectedPrice}`;
        window.open(`https://wa.me/5493854416248?text=${msj}`, '_blank');
    }
</script>
</body>
</html>
